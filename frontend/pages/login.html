<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Bebas+Neue&display=swap"
        rel="stylesheet">
    <title>Entrar - Yu-Gi-Oh! Card Generator</title>
</head>

<body>
    <header>
        <div class="header-inner">
            <h1 class="logo-text">Yu-Gi-Oh!</h1>
            <p class="header-sub">Card Generator</p>
        </div>
    </header>

    <main class="home-main">
        <div class="auth-box">
            <h2 class="auth-title">Área do Duelista</h2>

            <div class="auth-tabs">
                <button class="auth-tab active" data-tab="login">Entrar</button>
                <button class="auth-tab" data-tab="register">Criar Conta</button>
            </div>

            <!-- Login -->
            <form id="loginForm" class="auth-form" novalidate>
                <div class="form-group">
                    <label for="loginUsername">Usuário</label>
                    <input type="text" id="loginUsername" autocomplete="username"
                        placeholder="Seu nome de usuário" required />
                </div>
                <div class="form-group">
                    <label for="loginPassword">Senha</label>
                    <input type="password" id="loginPassword" autocomplete="current-password"
                        placeholder="Sua senha" required />
                </div>
                <div class="auth-msg" id="loginMsg"></div>
                <button type="submit" class="btn btn-primary" style="width:100%">Entrar</button>
            </form>

            <!-- Cadastro -->
            <form id="registerForm" class="auth-form" style="display:none" novalidate>
                <div class="form-group">
                    <label for="regUsername">Usuário</label>
                    <input type="text" id="regUsername" autocomplete="username"
                        placeholder="3–30 caracteres, letras/números/_" required />
                </div>
                <div class="form-group">
                    <label for="regPassword">Senha</label>
                    <input type="password" id="regPassword" autocomplete="new-password"
                        placeholder="Mínimo 6 caracteres" required />
                </div>
                <div class="form-group">
                    <label for="regPasswordConfirm">Confirmar Senha</label>
                    <input type="password" id="regPasswordConfirm" autocomplete="new-password"
                        placeholder="Repita a senha" required />
                </div>
                <div class="auth-msg" id="registerMsg"></div>
                <button type="submit" class="btn btn-primary" style="width:100%">Criar Conta</button>
            </form>

            <p class="auth-footer-link">
                <a href="/">← Voltar ao início</a>
            </p>
        </div>
    </main>

    <footer>
        <p>Yu-Gi-Oh! Card Generator</p>
    </footer>

    <script>
        const TOKEN_KEY = 'yugioh_token';

        // Redireciona se já está logado
        if (localStorage.getItem(TOKEN_KEY)) {
            const dest = sessionStorage.getItem('redirectAfterLogin') || '/';
            sessionStorage.removeItem('redirectAfterLogin');
            location.href = dest;
        }

        // Tabs
        document.querySelectorAll('.auth-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                const isLogin = tab.dataset.tab === 'login';
                document.getElementById('loginForm').style.display    = isLogin ? '' : 'none';
                document.getElementById('registerForm').style.display = isLogin ? 'none' : '';
                document.getElementById('loginMsg').textContent    = '';
                document.getElementById('registerMsg').textContent = '';
            });
        });

        function setMsg(id, text, type) {
            const el = document.getElementById(id);
            el.textContent = text;
            el.className = 'auth-msg ' + type;
        }

        function afterLogin(token, username) {
            localStorage.setItem(TOKEN_KEY, token);
            const dest = sessionStorage.getItem('redirectAfterLogin') || '/';
            sessionStorage.removeItem('redirectAfterLogin');
            location.href = dest;
        }

        // Login
        document.getElementById('loginForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            const btn = this.querySelector('button[type="submit"]');

            if (!username || !password) {
                setMsg('loginMsg', 'Preencha todos os campos.', 'error');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Entrando...';
            setMsg('loginMsg', '', '');

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password }),
                });
                const data = await res.json();
                if (res.ok) {
                    afterLogin(data.token, data.username);
                } else {
                    setMsg('loginMsg', data.error || 'Erro ao entrar.', 'error');
                    btn.disabled = false;
                    btn.textContent = 'Entrar';
                }
            } catch {
                setMsg('loginMsg', 'Erro de conexão com o servidor.', 'error');
                btn.disabled = false;
                btn.textContent = 'Entrar';
            }
        });

        // Cadastro
        document.getElementById('registerForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const username = document.getElementById('regUsername').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirm  = document.getElementById('regPasswordConfirm').value;
            const btn = this.querySelector('button[type="submit"]');

            if (!username || !password || !confirm) {
                setMsg('registerMsg', 'Preencha todos os campos.', 'error');
                return;
            }
            if (password !== confirm) {
                setMsg('registerMsg', 'As senhas não coincidem.', 'error');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Criando conta...';
            setMsg('registerMsg', '', '');

            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password }),
                });
                const data = await res.json();
                if (res.ok) {
                    setMsg('registerMsg', 'Conta criada! Entrando...', 'success');
                    setTimeout(() => afterLogin(data.token, data.username), 600);
                } else {
                    setMsg('registerMsg', data.error || 'Erro ao criar conta.', 'error');
                    btn.disabled = false;
                    btn.textContent = 'Criar Conta';
                }
            } catch {
                setMsg('registerMsg', 'Erro de conexão com o servidor.', 'error');
                btn.disabled = false;
                btn.textContent = 'Criar Conta';
            }
        });
    </script>
</body>

</html>
