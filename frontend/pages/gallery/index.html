<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartas - Yu-Gi-Oh! Card Generator</title>
    <link rel="stylesheet" href="../../shared/global.css" />
    <link rel="stylesheet" href="../../components/card-styles.css" />
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Bebas+Neue&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
</head>
<body>
<main>
    <!-- Stats do usuário -->
    <div class="user-stats" id="userStats">
        <div class="stat-card"><span class="stat-number" id="statTotal">–</span><span class="stat-label">Total</span></div>
        <div class="stat-card"><span class="stat-number" id="statMonstros">–</span><span class="stat-label">Monstros</span></div>
        <div class="stat-card"><span class="stat-number" id="statMagias">–</span><span class="stat-label">Magias</span></div>
        <div class="stat-card"><span class="stat-number" id="statArmadilhas">–</span><span class="stat-label">Armadilhas</span></div>
    </div>

    <!-- Filtros -->
    <div class="filters-bar">
        <input type="text" id="searchInput" placeholder="Buscar pelo nome..." class="search-input" />
        <div class="filter-buttons">
            <button class="filter-btn active" data-filter="TODOS">Todos</button>
            <button class="filter-btn" data-filter="MONSTRO">Monstros</button>
            <button class="filter-btn" data-filter="MAGIA">Magias</button>
            <button class="filter-btn" data-filter="ARMADILHA">Armadilhas</button>
            <button class="filter-btn" id="favFilterBtn">★ Favoritos</button>
        </div>
        <select id="sortSelect" class="sort-select" title="Ordenar por">
            <option value="recente">↓ Mais recente</option>
            <option value="antigo">↑ Mais antigo</option>
            <option value="nome-az">Nome A → Z</option>
            <option value="nome-za">Nome Z → A</option>
            <option value="nivel-desc">Nível ↓</option>
            <option value="nivel-asc">Nível ↑</option>
            <option value="atk-desc">ATK ↓</option>
            <option value="atk-asc">ATK ↑</option>
        </select>
    </div>

    <!-- Filtro atributo -->
    <div class="attr-filters" id="attrFilters" style="display:none">
        <span class="attr-filters-label">Atributo:</span>
        <button class="attr-btn active" data-attr="TODOS">Todos</button>
        <button class="attr-btn attr-fogo-btn" data-attr="FOGO">FOGO</button>
        <button class="attr-btn attr-agua-btn" data-attr="ÁGUA">ÁGUA</button>
        <button class="attr-btn attr-terra-btn" data-attr="TERRA">TERRA</button>
        <button class="attr-btn attr-vento-btn" data-attr="VENTO">VENTO</button>
        <button class="attr-btn attr-luz-btn" data-attr="LUZ">LUZ</button>
        <button class="attr-btn attr-trevas-btn" data-attr="TREVAS">TREVAS</button>
        <button class="attr-btn attr-divino-btn" data-attr="DIVINO">DIVINO</button>
    </div>

    <!-- Toolbar -->
    <div class="gallery-toolbar">
        <span class="card-counter" id="cardCounter"></span>
        <div class="toolbar-actions">
            <a href="/pages/stats/" class="btn btn-secondary btn-sm">📊 Stats</a>
            <a href="/pages/decks/" class="btn btn-secondary btn-sm">📁 Decks</a>
            <button class="btn btn-secondary btn-sm" id="selectModeBtn" onclick="toggleSelectMode()">☑ Selecionar</button>
            <a href="/pages/card-form/" class="btn btn-secondary btn-sm">+ Nova Carta</a>
            <button class="btn btn-secondary btn-sm" onclick="exportarJSON()">↓ JSON</button>
            <button class="btn btn-secondary btn-sm" id="exportPDFBtn" onclick="exportarPDF()">↓ PDF</button>
        </div>
    </div>

    <!-- Batch bar -->
    <div class="batch-bar" id="batchBar" style="display:none">
        <span class="batch-count" id="batchCount">0 selecionadas</span>
        <div class="batch-actions">
            <button class="btn btn-secondary btn-sm" onclick="selectAll()">Todas</button>
            <button class="btn btn-secondary btn-sm" onclick="deselectAll()">Nenhuma</button>
            <button class="btn btn-secondary btn-sm" onclick="exportarJSONSelecionadas()">↓ JSON</button>
            <button class="btn btn-danger btn-sm" onclick="deletarSelecionadas()">Deletar selecionadas</button>
        </div>
    </div>

    <!-- Grade -->
    <div class="cards-grid" id="cardsGrid">
        <div class="loading">Carregando cartas...</div>
    </div>
</main>

<!-- Modal fullscreen -->
<div class="modal-overlay" id="modalOverlay">
    <button class="modal-close-btn" id="modalCloseBtn" title="Fechar (Esc)">✕</button>
    <div class="modal-content">
        <div class="modal-card-scale-wrapper">
            <div id="modalCardContainer"></div>
        </div>
        <div class="modal-action-buttons">
            <button class="btn btn-secondary btn-sm" id="modalFavBtn">☆ Favorito</button>
            <a href="#" class="btn btn-secondary btn-sm" id="modalEditBtn">Editar</a>
            <a href="#" class="btn btn-secondary btn-sm" id="modalCloneBtn">Clonar</a>
            <button class="btn btn-secondary btn-sm" id="modalDlBtn">↓ Baixar PNG</button>
            <button class="btn btn-danger btn-sm" id="modalDelBtn">Deletar</button>
        </div>
        <p class="modal-hint">Clique fora ou pressione Esc para fechar</p>
    </div>
</div>

<!-- Popup exclusão -->
<div class="delete-popup-overlay" id="deletePopup">
    <div class="delete-popup">
        <div class="delete-popup-icon">⚠</div>
        <h3 class="delete-popup-title">Deletar esta carta?</h3>
        <p class="delete-popup-card-name" id="deletePopupCardName"></p>
        <p class="delete-popup-desc">Esta ação não pode ser desfeita.</p>
        <div class="delete-popup-actions">
            <button class="btn btn-secondary" id="deletePopupCancel">Cancelar</button>
            <button class="btn btn-danger" id="deletePopupConfirm">Deletar</button>
        </div>
    </div>
</div>

<script src="../../shared/auth.js"></script>
<script src="../../shared/sidebar.js"></script>
<script src="../../components/card-builder.js"></script>
<script src="script.js"></script>
</body>
</html>
