<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Gerador de Cartas Yu-Gi-Oh" />
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Bebas+Neue&display=swap"
        rel="stylesheet">
    <title>Yu-Gi-Oh! Card Generator</title>
</head>

<body>
    <header>
        <div class="header-inner">
            <h1 class="logo-text">Yu-Gi-Oh!</h1>
            <p class="header-sub">Card Generator</p>
        </div>
    </header>

    <main class="home-main">
        <div class="hero">
            <h2 class="hero-title">Crie suas próprias cartas</h2>
            <p class="hero-subtitle">Olá duelista! Construa seu deck personalizado e siga o coração das cartas.</p>

            <div class="hero-stats" id="statsContainer">
                <div class="stat-card">
                    <span class="stat-number" id="totalCartas">–</span>
                    <span class="stat-label">Cartas</span>
                </div>
                <div class="stat-card">
                    <span class="stat-number" id="totalMonstros">–</span>
                    <span class="stat-label">Monstros</span>
                </div>
                <div class="stat-card">
                    <span class="stat-number" id="totalMagias">–</span>
                    <span class="stat-label">Magias</span>
                </div>
                <div class="stat-card">
                    <span class="stat-number" id="totalArmadilhas">–</span>
                    <span class="stat-label">Armadilhas</span>
                </div>
            </div>

            <div class="home-buttons">
                <a href="pages/verCartas.html" class="btn btn-primary">Ver Cartas</a>
                <a href="pages/cadastrarCartas.html" class="btn btn-secondary">Nova Carta</a>
            </div>
        </div>
    </main>

    <footer>
        <p>Yu-Gi-Oh! Card Generator</p>
    </footer>

    <script>
        async function loadStats() {
            try {
                const res = await fetch('/api/cartas');
                const cartas = await res.json();
                document.getElementById('totalCartas').textContent = cartas.length;
                document.getElementById('totalMonstros').textContent = cartas.filter(c => c.tipo === 'MONSTRO').length;
                document.getElementById('totalMagias').textContent = cartas.filter(c => c.tipo === 'MAGIA').length;
                document.getElementById('totalArmadilhas').textContent = cartas.filter(c => c.tipo === 'ARMADILHA').length;
            } catch {
                document.getElementById('statsContainer').style.display = 'none';
            }
        }
        loadStats();
    </script>
</body>

</html>
